name: Multi-Platform Qt Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Avoid stopping all jobs, if one fails
      matrix:
        include:
          # macOS Intel (10.15 Support)
          - os: macos-13
            arch: x86_64
            qt_arch: clang_64
          # macOS Apple Silicon
          - os: macos-14
            arch: arm64
            qt_arch: clang_64
          # Windows (Standard 64-bit)
          - os: windows-latest
            arch: x64
            qt_arch: msvc2019_64
          # Linux (Ubuntu)
          - os: ubuntu-latest
            arch: x86_64
            qt_arch: gcc_64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.0'
          arch: ${{ matrix.qt_arch }}
          # Caching ist automatisch aktiv

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libgl1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0

      - name: Set macOS Target
        if: matrix.os == 'macos-13'
        run: echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV

      # 4. Configure & Build
      - name: Build App
        shell: bash # Einheitliche Shell erleichtert die Syntax
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            ${{ runner.os == 'macOS' && format('-DCMAKE_OSX_ARCHITECTURES={0}', matrix.arch) || '' }}
          cmake --build . --config Release --parallel

      # 5. Packaging ( for Windows, MacOS, Linux)
      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          # Annahme: Dein Target heißt appAcoustic_Calculator
          # windeployqt braucht den Pfad zur .exe
          windeployqt build/src/Controller/Release/appAcoustic_Calculator.exe --dir build/dist --qmldir src/UI/
          powershell Compress-Archive -Path build/dist/* -DestinationPath build/Acoustic_Calculator_Windows.zip
      
      - name: Package MacOS
        if: runner.os == 'macOS'
        run: |
          macdeployqt build/src/Controller/appAcoustic_Calculator.app -dmg -qmldir=src/UI/
          mv build/src/Controller/appAcoustic_Calculator.dmg build/Acoustic_Calculator-MacOS-${{ matrix.arch }}.dmg
      
      - name: Package Linux (Einfacher Weg)
        if: runner.os == 'Linux'
        run: |
          # Da AppImage-Setup aufwendig ist, zippen wir hier erst mal nur das Binary + Libs
          mkdir -p build/dist
          cp build/src/appAcoustic_Calculator build/dist/
          # Hinweis: Ohne linuxdeployqt wird das Binary auf anderen PCs evtl. nicht starten
          tar -czf build/Acoustic_Calculator_Linux.tar.gz -C build/dist .

      # 6. Upload der fertigen Dateien
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-build
          path: |
            build/*.dmg
            build/*.zip
            build/dist/

