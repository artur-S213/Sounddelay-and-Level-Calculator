name: Multi-Platform Qt Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Verhindert, dass alle Jobs abbrechen, wenn einer fehlschlägt
      matrix:
        include:
          # macOS Intel (10.15 Support)
          - os: macos-13
            arch: x86_64
            qt_arch: clang_64
          # macOS Apple Silicon
          - os: macos-14
            arch: arm64
            qt_arch: clang_64
          # Windows (Standard 64-bit)
          - os: windows-latest
            arch: x64
            qt_arch: msvc2019_64
          # Linux (Ubuntu)
          - os: ubuntu-latest
            arch: x86_64
            qt_arch: gcc_64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.0'
          arch: ${{ matrix.qt_arch }}
          # Caching ist automatisch aktiv

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libgl1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0

      - name: Set macOS Target
        if: matrix.os == 'macos-13'
        run: echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV

      # 4. Konfigurieren & Bauen
      - name: Build App
        shell: bash # Einheitliche Shell erleichtert die Syntax
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            ${{ runner.os == 'macOS' && format('-DCMAKE_OSX_ARCHITECTURES={0}', matrix.arch) || '' }}
          cmake --build . --config Release --parallel

      # 5. Packaging (Unterschiedlich je nach OS)
      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          windeployqt build/Release/YourAppName.exe --dir build/dist

      - name: Package MacOS
        if: runner.os == 'macOS'
        run: |
          macdeployqt build/YourAppName.app -dmg
          mv build/*.dmg build/YourAppName-${{ matrix.arch }}.dmg

      - name: Package Linux (AppImage)
        if: runner.os == 'Linux'
        run: |
          # Hier nutzt man oft linuxdeployqt, um ein AppImage zu erstellen
          echo "Hier Linux Packaging Logik einfügen"

      # 6. Upload der fertigen Dateien
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-build
          path: |
            build/*.dmg
            build/*.zip
            build/dist/